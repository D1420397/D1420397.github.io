<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>簡易五子棋遊戲</title>
    <style>
        body { text-align: center; font-family: sans-serif; background-color: #f0f0f0; }
        h1 { color: #333; }
        #board { 
            display: grid; 
            grid-template-columns: repeat(15, 30px); 
            grid-template-rows: repeat(15, 30px); 
            gap: 1px; 
            background-color: #d18b47; 
            padding: 10px; 
            border: 2px solid #8b5a2b;
            margin: 20px auto;
            width: fit-content;
        }
        .cell { 
            width: 30px; height: 30px; 
            background-color: #ffce9e; 
            border: 0.5px solid #d18b47; 
            cursor: pointer;
            display: flex; justify-content: center; align-items: center;
        }
        .black { width: 24px; height: 24px; background: black; border-radius: 50%; }
        .white { width: 24px; height: 24px; background: white; border-radius: 50%; border: 1px solid #ccc; }
        #status { font-size: 1.2em; font-weight: bold; margin-bottom: 10px; }
        button { padding: 10px 20px; cursor: pointer; font-size: 1em; }
    </style>
</head>
<body>

    <h1>五子棋遊戲</h1>
    <div id="status">輪到：黑棋</div>
    <div id="board"></div>
    <br>
    <button onclick="resetGame()">重新開始</button>

    <script>
        const size = 15;
        let boardData = Array(size).fill().map(() => Array(size).fill(null));
        let isBlackNext = true;
        let gameOver = false;
        const boardElement = document.getElementById('board');
        const statusElement = document.getElementById('status');

        function createBoard() {
            boardElement.innerHTML = '';
            for (let r = 0; r < size; r++) {
                for (let c = 0; c < size; c++) {
                    const cell = document.createElement('div');
                    cell.className = 'cell';
                    cell.onclick = () => placePiece(r, c);
                    boardElement.appendChild(cell);
                }
            }
        }

        function placePiece(r, c) {
            if (boardData[r][c] || gameOver) return;

            const currentPlayer = isBlackNext ? 'black' : 'white';
            boardData[r][c] = currentPlayer;
            
            const cellIndex = r * size + c;
            const piece = document.createElement('div');
            piece.className = currentPlayer;
            boardElement.children[cellIndex].appendChild(piece);

            if (checkWin(r, c, currentPlayer)) {
                statusElement.innerText = `獲勝者：${isBlackNext ? '黑棋' : '白棋'}！`;
                gameOver = true;
                return;
            }

            isBlackNext = !isBlackNext;
            statusElement.innerText = `輪到：${isBlackNext ? '黑棋' : '白棋'}`;
        }

        function checkWin(r, c, p) {
            const directions = [[1,0], [0,1], [1,1], [1,-1]];
            return directions.some(([dr, dc]) => {
                let count = 1;
                for (let i = 1; i < 5; i++) {
                    if (boardData[r + dr * i]?.[c + dc * i] === p) count++;
                    else break;
                }
                for (let i = 1; i < 5; i++) {
                    if (boardData[r - dr * i]?.[c - dc * i] === p) count++;
                    else break;
                }
                return count >= 5;
            });
        }

        function resetGame() {
            boardData = Array(size).fill().map(() => Array(size).fill(null));
            isBlackNext = true;
            gameOver = false;
            statusElement.innerText = "輪到：黑棋";
            createBoard();
        }

        createBoard();
    </script>
</body>
</html>
